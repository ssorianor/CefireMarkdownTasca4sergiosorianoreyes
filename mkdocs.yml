site_name: Programació Modular
site_description: Apunts de Programació Modular - Curs 2025-2026
site_author: Sergio Soriano Reyes
docs_dir: 'md'
site_dir: 'docs'

theme:
  name: material
  language: ca
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Canvia a mode fosc
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Canvia a mode clar
  features:
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.integrate

plugins:
  - search:
      lang: es
  - print-site:
      add_to_navigation: true
      print_page_title: 'Imprimir / Descarregar PDF'
      add_print_site_banner: true
      print_site_banner_template: "md/templates/custom_banner.html"
      add_table_of_contents: true
      toc_title: 'Taula de continguts'
      toc_depth: 3
      add_full_urls: false
      enumerate_headings: false
      enumerate_figures: false
      add_cover_page: false
      include_css: true
      enabled: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Inici: index.md
